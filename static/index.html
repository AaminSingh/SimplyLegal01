<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimplyLegal Contract Generator</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 0 auto; padding: 24px; background: #f8fafc; color: #111827; }
    h1 { margin-bottom: 12px; }
    label { display: block; margin: 16px 0 6px; font-weight: 600; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; }
    button { margin-top: 18px; padding: 12px 18px; border: none; background: #2563eb; color: white; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: default; }
    .message { margin-top: 16px; padding: 14px; border-radius: 8px; background: #e2e8f0; color: #0f172a; }
  </style>
</head>
<body>
  <h1>SimplyLegal Contract Generator</h1>
  <p>Enter details and download a generated contract PDF.</p>

  <label for="contract_type">Contract type</label>
  <input id="contract_type" type="text" value="NDA" />

  <label for="party_name">Party name</label>
  <input id="party_name" type="text" value="Acme Corp" />

  <label for="state">State</label>
  <input id="state" type="text" value="California" />

  <button id="generateBtn">Generate PDF</button>

  <div id="message" class="message" style="display:none"></div>

  <script>
    const button = document.getElementById('generateBtn');
    const message = document.getElementById('message');

    async function downloadPdf() {
      button.disabled = true;
      message.style.display = 'block';
      message.textContent = 'Generating PDF...';

      const data = {
        contract_type: document.getElementById('contract_type').value,
        party_name: document.getElementById('party_name').value,
        state: document.getElementById('state').value,
      };

      try {
        const response = await fetch('/generate-pdf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (!response.ok) {
          const contentType = response.headers.get('content-type') || '';
          let errorMessage = 'Failed to generate PDF';

          if (contentType.includes('application/json')) {
            const error = await response.json();
            errorMessage = error.detail || error.message || errorMessage;
          } else {
            const text = await response.text();
            errorMessage = text || errorMessage;
          }

          throw new Error(errorMessage);
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'contract.pdf';
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        message.textContent = 'PDF generated successfully. Download should start automatically.';
      } catch (err) {
        message.textContent = 'Error: ' + err.message;
      } finally {
        button.disabled = false;
      }
    }

    button.addEventListener('click', downloadPdf);
  </script>
</body>
</html>
